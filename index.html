<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .div1{
      background-color: aliceblue;
      width: 250px;
    border-radius: 20px;
    padding: 16px;
    height: 450px;
    }
    .img1{
          width: 250px;
          height: 250px;
          border-radius: 7px; 
    }
    body{
      flex-direction: column;
      min-height: 100vh;
      justify-content:  center;
      align-items: center;
      display: flex;
         text-align: center;
      background-color: rgba(141, 166, 174, 0.647);
    }
    .attribution { font-size: 0.6875rem; text-align: center; padding-top: 10px;}
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body style="text-align: center;">

  <div class="div1">

 
   <img src="image-qr-code.png" alt="QR"  class="img1">

 <h2><em> <b>Improve your front-end skills by building projects</h2></b>

 <p> Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p></em>
  </div>
  
  <footer class="attribution">
   <i> Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.</i>
  </footer>
